name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare production env
        shell: bash
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
          VITE_APP_HOST: ${{ vars.VITE_APP_HOST }}
          VITE_FORCE_HTTPS: ${{ vars.VITE_FORCE_HTTPS }}
          VITE_APP_VERSION_NAME: ${{ vars.VITE_APP_VERSION_NAME }}
          VITE_APP_VERSION_CODE: ${{ vars.VITE_APP_VERSION_CODE }}
          VITE_ENABLE_NATIVE_PUSH: ${{ vars.VITE_ENABLE_NATIVE_PUSH }}
        run: |
          if [ -n "$VITE_API_BASE_URL" ]; then
            printf '%s\n' \
              "VITE_API_BASE_URL=$VITE_API_BASE_URL" \
              "VITE_SOCKET_URL=$VITE_SOCKET_URL" \
              "VITE_APP_HOST=$VITE_APP_HOST" \
              "VITE_FORCE_HTTPS=${VITE_FORCE_HTTPS:-1}" \
              "VITE_APP_VERSION_NAME=${VITE_APP_VERSION_NAME:-1.0.0}" \
              "VITE_APP_VERSION_CODE=${VITE_APP_VERSION_CODE:-1}" \
              "VITE_ENABLE_NATIVE_PUSH=${VITE_ENABLE_NATIVE_PUSH:-false}" \
              > .env.production
          elif [ -f .env.production ]; then
            echo 'Using committed .env.production'
          else
            cp .env.production.example .env.production
          fi

      - name: Build web bundle
        run: npm run build

      - name: Add Android platform
        shell: bash
        run: |
          if [ ! -f android/gradlew ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Apply Android launcher icons
        run: npm run android:icons:apply

      - name: Inject Firebase config (google-services.json)
        if: ${{ env.GOOGLE_SERVICES_JSON_B64 != '' || env.GOOGLE_SERVICES_JSON != '' }}
        env:
          REQUIRE_ANDROID_FIREBASE: "1"
        run: node ./scripts/setup-android-firebase.mjs --strict

      - name: Firebase config missing (build without FCM)
        if: ${{ env.GOOGLE_SERVICES_JSON_B64 == '' && env.GOOGLE_SERVICES_JSON == '' }}
        run: echo "No Firebase secrets found. Building APK without Android FCM configuration."

      - name: Build installable debug APK
        shell: bash
        run: |
          test -f android/gradlew
          chmod +x android/gradlew
          cd android
          ./gradlew :app:assembleDebug

      - name: Collect APK artifact
        shell: bash
        run: |
          mkdir -p artifacts
          APK_PATH="$(find android/app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "APK file not found after build"
            exit 1
          fi
          cp "$APK_PATH" artifacts/Vibe-debug.apk
          echo "Collected APK: $APK_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vibe-debug-apk
          path: artifacts/Vibe-debug.apk
          if-no-files-found: error
